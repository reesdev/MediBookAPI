server:
  port: ${APP_PORT:3090}

spring:
  # Konfigurasi Database Datasource
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:medibook_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Konfigurasi Liquibase Migration
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Konfigurasi JPA & Hibernate
  jpa:
    hibernate:
      ddl-auto: validate # Validasi kecocokan Entity JPA dengan skema Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Konfigurasi Caching (Redis)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      timeout: 60000

  # Batasan Ukuran Upload File
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

# Pengaturan Lokasi Folder Upload Berkas
app:
  upload:
    dir: uploads
  jwt:
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration-ms: 86400000 # 24 Jam
