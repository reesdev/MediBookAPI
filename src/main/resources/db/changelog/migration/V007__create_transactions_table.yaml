databaseChangeLog:
  - changeSet:
      id: V007-create-transactions-table
      author: reesky
      comment: "Membuat tabel transactions untuk mencatat log pembayaran finansial"
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: booking_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transactions_booking
                    referencedTableName: bookings
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: transaction_code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: amount
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: ENUM('PENDING', 'SUCCESS', 'FAILED')
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - sql:
            dbms: mysql
            sql: ALTER TABLE transactions ADD CONSTRAINT chk_amount CHECK (amount >= 0.0);
        - createIndex:
            tableName: transactions
            indexName: idx_transaction_code
            columns:
              - column: { name: transaction_code }
        - createIndex:
            tableName: transactions
            indexName: idx_transaction_booking
            columns:
              - column: { name: booking_id }
