databaseChangeLog:
  - changeSet:
      id: V003-create-doctors-table
      author: reesky
      comment: "Membuat tabel doctors dengan relasi user_id (RESTRICT)"
      changes:
        - createTable:
            tableName: doctors
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    unique: true
                    nullable: true
                    foreignKeyName: fk_doctors_user
                    referencedTableName: users
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: full_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: specialization
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: sip
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
