databaseChangeLog:
  - changeSet:
      id: V008-create-booking-events-table
      author: reesky
      comment: "Membuat tabel booking_events untuk audit trail pendaftaran"
      changes:
        - createTable:
            tableName: booking_events
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: booking_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_events_booking
                    referencedTableName: bookings
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: actor
                  type: ENUM('PATIENT', 'DOCTOR', 'ADMIN', 'SYSTEM')
                  constraints:
                    nullable: false
              - column:
                  name: detail
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
