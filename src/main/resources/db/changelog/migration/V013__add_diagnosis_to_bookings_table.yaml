databaseChangeLog:
  - changeSet:
      id: add-diagnosis-prescription-columns
      author: antigravity
      changes:
        - addColumn:
            tableName: bookings
            columns:
              - column:
                  name: diagnosis
                  type: text
                  constraints:
                    nullable: true
              - column:
                  name: prescription_notes
                  type: text
                  constraints:
                    nullable: true
