databaseChangeLog:
  - changeSet:
      id: V006-create-bookings-table
      author: reesky
      comment: "Membuat tabel bookings dengan status ENUM, indexes, dan constraints"
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: booking_code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: patient_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_patient
                    referencedTableName: patients
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: service_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_service
                    referencedTableName: hospital_services
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: doctor_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_bookings_doctor
                    referencedTableName: doctors
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: schedule_id
                  type: BIGINT
                  constraints:
                    nullable: true
                    foreignKeyName: fk_bookings_schedule
                    referencedTableName: doctor_schedules
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: booking_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: queue_number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: ENUM('PENDING_PAYMENT', 'CONFIRMED', 'IN_PROGRESS', 'COMPLETED', 'CANCELLED')
                  defaultValue: PENDING_PAYMENT
                  constraints:
                    nullable: false
              - column:
                  name: complaint
                  type: TEXT
              - column:
                  name: total_fee
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: bookings
            columnNames: patient_id, schedule_id, booking_date
            constraintName: uq_patient_schedule_date
        - sql:
            dbms: mysql
            sql: ALTER TABLE bookings ADD CONSTRAINT chk_total_fee CHECK (total_fee >= 0.0);
        # Indexing tabel bookings
        - createIndex:
            tableName: bookings
            indexName: idx_booking_code
            columns:
              - column: { name: booking_code }
        - createIndex:
            tableName: bookings
            indexName: idx_booking_patient
            columns:
              - column: { name: patient_id }
        - createIndex:
            tableName: bookings
            indexName: idx_booking_doctor
            columns:
              - column: { name: doctor_id }
        - createIndex:
            tableName: bookings
            indexName: idx_booking_service
            columns:
              - column: { name: service_id }
        - createIndex:
            tableName: bookings
            indexName: idx_booking_schedule
            columns:
              - column: { name: schedule_id }
        - createIndex:
            tableName: bookings
            indexName: idx_booking_date
            columns:
              - column: { name: booking_date }
        - createIndex:
            tableName: bookings
            indexName: idx_booking_status_date
            columns:
              - column: { name: status }
              - column: { name: created_at }
