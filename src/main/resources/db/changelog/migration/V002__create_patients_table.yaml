databaseChangeLog:
  - changeSet:
      id: V002-create-patients-table
      author: reesky
      comment: "Membuat tabel patients dengan relasi user_id (RESTRICT)"
      changes:
        - createTable:
            tableName: patients
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    unique: true
                    nullable: true
                    foreignKeyName: fk_patients_user
                    referencedTableName: users
                    referencedColumnNames: id
                    deleteCascade: false
              - column:
                  name: full_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: nik
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: phone
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: birth_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: ENUM('Laki-laki', 'Perempuan')
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: TEXT
              - column:
                  name: is_deleted
                  type: TINYINT(1)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
