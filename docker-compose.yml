version: '3.8'

services:
  # Service Database MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: medibook-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=medibook_db
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  # Service Caching Redis
  redis:
    image: redis:7.0-alpine
    container_name: medibook-redis
    ports:
      - "6380:6379"
    restart: always

volumes:
  mysql-data:
