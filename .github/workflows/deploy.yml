name: Deploy Medibook to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/medibook-api:latest .
        docker push ${{ secrets.DOCKER_HUB_USERNAME }}/medibook-api:latest

    - name: Copy docker-compose to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/home/student01/"

    - name: Execute Deployment on VPS
      uses: appleboy/ssh-action@v1.0.3
      env:
        DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: DOCKER_USER
        script: |
          cd /home/student01/
          sed -i "s/YOUR_DOCKERHUB_USERNAME/$DOCKER_USER/g" docker-compose.yml
          docker compose down || true
          docker compose pull
          docker compose up -d
          docker image prune -f
