name: CI/CD - Build & Deploy

concurrency:
  group: deploy-student1
  cancel-in-progress: true

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: medibook-api
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      APP_DIR: /home/student01

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ env.APP_DIR }}"
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ${{ env.APP_DIR }}
            cd ${{ env.APP_DIR }}
            
            echo "Starting deployment..."

            echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" > .env
            echo "APP_PORT=9001" >> .env
            echo "SPRING_PROFILES_ACTIVE=prod" >> .env
            
            echo "DB_HOST=38.47.180.18" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_NAME=db_spring_student1" >> .env
            echo "DB_USER=student1" >> .env
            echo "DB_PASSWORD=kX9#mP2v\$LqZ" >> .env 
            
            echo "REDIS_HOST=host.docker.internal" >> .env
            echo "REDIS_PORT=6379" >> .env

            docker network inspect be_classroom_net >/dev/null 2>&1 || docker network create be_classroom_net

            docker compose pull medibook-app
            docker compose down
            docker compose up -d medibook-app

            sleep 30

            if docker compose ps | grep -q "Up"; then
              echo "Deployment completed successfully!"
              docker compose ps
            else
              echo "Deployment failed! Check application logs below:"
              docker compose logs medibook-app
              exit 1
            fi
