name: CI/CD - Build & Deploy

concurrency:
  group: deploy-mentor
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: medibook-app
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      APP_DIR: /home/backend/medibook

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build application
        run: ./mvnw -B clean package -DskipTests

      # 🐳 Docker Login
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 🐳 Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      # 📦 Copy compose
      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "${{ env.APP_DIR }}"
          overwrite: true

      # 🚀 DEPLOY ON VPS (PULL & RUN ONLY)
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            echo "🚀 Starting deployment..."

            # 📝 Menulis ULANG file .env khusus untuk Production VPS (Gunakan > untuk overwrite)
            echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" > .env
            echo "APP_PORT=9000" >> .env
            echo "SPRING_PROFILES_ACTIVE=prod" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            
            # Konfigurasi Jaringan & Database VPS
            echo "DB_HOST=38.47.180.18" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_NAME=medibook_db" >> .env
            echo "DB_USER=root" >> .env
            echo "DB_PASSWORD=rahasia2026" >> .env 
            
            # Konfigurasi Redis VPS
            echo "REDIS_HOST=host.docker.internal" >> .env
            echo "REDIS_PORT=6379" >> .env

            # 🌐 Pastikan network eksternal 'be_classroom_net' sudah ada
            docker network inspect be_classroom_net >/dev/null 2>&1 || docker network create be_classroom_net

            echo "📥 Pulling latest image from Docker Hub..."
            docker compose pull medibook-app

            echo "🔄 Restarting services..."
            docker compose down
            docker compose up -d medibook-app

            echo "⏳ Waiting for container to initialize..."
            sleep 30

            # Verifikasi status deployment
            if docker compose ps | grep -q "Up"; then
              echo "✅ Deployment completed successfully!"
              docker compose ps
            else
              echo "❌ Deployment failed! Check application logs below:"
              docker compose logs medibook-app
              exit 1
            fi
