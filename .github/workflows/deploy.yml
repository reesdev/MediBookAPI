name: Deploy Medibook to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v3

    - name: 2. Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 3. Build & Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/medibook-api:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/medibook-api:latest

    - name: 4. Copy docker-compose.yml to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/home/student/spring-app/student1/"

    - name: 5. Deploy & Run on VPS
      uses: appleboy/ssh-action@v1.0.3
      env:
        DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        envs: DOCKER_USER
        script: |
          cd /home/student/spring-app/student1/
          
          # Sisipkan username docker otomatis ke dalam docker-compose.yml
          sed -i "s/YOUR_DOCKERHUB_USERNAME/$DOCKER_USER/g" docker-compose.yml
          
          # Hentikan aplikasi lama
          docker compose down || true
          
          # Tarik versi terbaru dari repo Docker Hub pribadi Anda
          docker compose pull
          
          # Nyalakan kontainer versi terbaru
          docker compose up -d
          
          # Bersihkan sampah image sisa agar VPS tidak penuh
          docker image prune -f
